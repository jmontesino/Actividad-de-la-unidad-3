<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto - Actividad Unidad 3</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8f9fa;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
        header {
            background: #343a40;
            color: #fff;
            padding: 1.5rem 0;
            text-align: center;
        }
        footer {
            background: #343a40;
            color: #fff;
            text-align: center;
            padding: 1rem 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
        .custom-form {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            padding: 2rem;
            margin-top: 2rem;
            }
        .form-label {
            font-weight: 500;
        }
        .btn-custom {
            background: #007bff;
            color: #fff;
            font-weight: bold;
        }
        .btn-custom:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <header>
        <h1>Formulario de Contacto</h1>
        <p>¡Contáctanos para más información!</p>
    </header>
    <main class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <form class="custom-form needs-validation" novalidate>
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre completo</label>
                        <input type="text" class="form-control" id="nombre" name="nombre" required pattern="[A-Za-záéíóúÁÉÍÓÚñÑ ]{3,}" placeholder="Escribe tu nombre">
                        <div class="invalid-feedback">Por favor ingresa tu nombre (mínimo 3 letras).</div>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" name="email" required placeholder="ejemplo@correo.com">
                        <div class="invalid-feedback">Ingresa un correo válido.</div>
                    </div>
                    <div class="mb-3">
                        <label for="mensaje" class="form-label">Mensaje</label>
                        <textarea class="form-control" id="mensaje" name="mensaje" rows="4" required placeholder="Escribe tu mensaje"></textarea>
                        <div class="invalid-feedback">El mensaje es obligatorio.</div>
                    </div>
                    <div class="mb-3">
                        <label for="tema" class="form-label">Tema de interés</label>
                        <select class="form-select" id="tema" name="tema" required>
                            <option value="">Selecciona una opción</option>
                            <option value="soporte">Soporte</option>
                            <option value="ventas">Ventas</option>
                            <option value="otros">Otros</option>
                        </select>
                        <div class="invalid-feedback">Selecciona un tema.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">¿Cómo prefieres ser contactado?</label><br>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contacto" id="contactoEmail" value="email" required>
                            <label class="form-check-label" for="contactoEmail">Email</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="contacto" id="contactoTelefono" value="telefono" required>
                            <label class="form-check-label" for="contactoTelefono">Teléfono</label>
                        </div>
                        <div class="invalid-feedback d-block">Selecciona una opción.</div>
                    </div>
                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="acepto" name="acepto" required>
                            <label class="form-check-label" for="acepto">Acepto los términos y condiciones</label>
                            <div class="invalid-feedback">Debes aceptar los términos.</div>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-custom w-100">Enviar</button>
                </form>
            </div>
        </div>
    </main>
    <footer>
        &copy; 2025 Actividad Unidad 3. Todos los derechos reservados.
    </footer>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Validación Bootstrap
        (() => {
            'use strict';
            const forms = document.querySelectorAll('.needs-validation');
            Array.from(forms).forEach(form => {
                form.addEventListener('submit', event => {
                    if (!form.checkValidity()) {
                        event.preventDefault();
                        event.stopPropagation();
                    }
                    form.classList.add('was-validated');
                }, false);
            });
        })();
    </script>
</body>
</html>
